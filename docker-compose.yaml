services:
  tts:
    image: ghcr.io/bob-ros2/bob-q3tts:latest
    build:
      context: .
      args:
        - ROS_DISTRO=humble
        - USER_UID=${USER_UID:-1000}
        - USER_GID=${USER_GID:-1000}
        - USERNAME=${USERNAME:-rosuser}
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all
      - ROS_DOMAIN_ID=99
      - PULSE_SERVER=unix:/run/user/1000/pulse/native
      # TTS node parameters
      - Q3TTS_MODEL_DIR=/models
      - Q3TTS_LANGUAGE=German
      - Q3TTS_PLAY=true
      - Q3TTS_VOICE_REF_AUDIO=/app/ros2_ws/src/bob_q3tts/config/eva_24khz.wav
      - Q3TTS_VOICE_REF_TEXT=/app/ros2_ws/src/bob_q3tts/config/voice_ref_text.txt
    volumes:
      - ./models:/models
      - ./config:/app/ros2_ws/src/bob_q3tts/config
      - /run/user/1000/pulse:/run/user/1000/pulse
    devices:
      - /dev/snd:/dev/snd
    group_add:
      - audio
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [ gpu ]
    network_mode: host
    ipc: host
    command: >
      ros2 run bob_q3tts tts --ros-args  -p model_dir:=/models  -p language:=German  -p play:=true  -p temperature:=0.2  -p do_sample:=false
