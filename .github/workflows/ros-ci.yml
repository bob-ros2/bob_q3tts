name: ROS 2 CI

# ==============================================================================
# HINWEIS ZUM SELF-HOSTED RUNNER:
# ==============================================================================
# Dieser Workflow nutzt primär deinen lokalen Server (self-hosted).
#
# WENN DER RUNNER NICHT LÄUFT:
# Die CI-Action bleibt im Status 'Queued' hängen und wartet auf deinen Server.
#
# SO SCHALTEST DU IHN AN:
# Gehe auf deinem Server in den Ordner: /blue/dev/q3tts/gitrunner
# Führe aus: docker compose up -d
#
# SO SCHALTEST DU ZURÜCK AUF GITHUB-CLOUD (FALLS DEIN SERVER OFFLINE BLEIBT):
# Ändere unten bei 'runs-on:' den Wert von [self-hosted] zurück auf [ubuntu-latest].
# ==============================================================================

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  LANG: en_US.UTF-8
  PYTHONPATH: /opt/ros/humble/lib/python3.10/site-packages:/opt/ros/humble/local/lib/python3.10/dist-packages

jobs:
  test:
    # Hier wird dein lokaler Runner ausgewählt. Ohne lokale Instanz passiert hier nichts!
    runs-on: self-hosted
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup ROS 2
        uses: ros-tooling/setup-ros@v0.7
        with:
          required-ros-distributions: humble

      - name: Build and Test
        uses: ros-tooling/action-ros-ci@v0.3
        with:
          package-name: bob_q3tts
          target-ros2-distro: humble
          vcs-repo-file-url: ""
          import-token: ${{ secrets.GITHUB_TOKEN }}
