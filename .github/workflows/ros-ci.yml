name: ROS 2 CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup ROS 2
        uses: ros-tooling/setup-ros@v0.7
        with:
          required-ros-distributions: humble

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pip
          pip3 install flake8 flake8-blind-except flake8-builtins flake8-class-newline flake8-comprehensions flake8-deprecated flake8-docstrings flake8-import-order flake8-quotes

      - name: Build and Test
        uses: ros-tooling/action-ros-ci@v0.3
        with:
          package-name: bob_q3tts
          target-ros2-distro: humble
          # Skip heavy dependencies for linting-only CI
          vcs-repo-file-url: ""
          import-token: ${{ secrets.GITHUB_TOKEN }}
